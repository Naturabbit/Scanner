name: Binance USDT Listing Filter

on:
  workflow_dispatch:
  schedule:
    # 每周一 08:00 UTC 运行一次
    - cron: '0 8 * * 1'

jobs:
  filter-symbols:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Binance filter and write summary
        run: python main.py
